name: runpod-flux2klein-worker — build & push docker image

# Builds the production FLUX.2 Klein worker image and pushes it to Docker Hub.
# Runs on Blacksmith (faster + cheaper than GitHub-hosted runners). Required
# repo secrets:
#   DOCKERHUB_USERNAME — your Docker Hub username
#   DOCKERHUB_TOKEN    — Docker Hub access token (Settings → Security)
# Optional repo variable:
#   DOCKERHUB_REPO     — override the org/user prefix (defaults to USERNAME)
#
# RunPod template config (set after first successful push):
#   Image:          <DOCKERHUB_USERNAME>/vj0-flux2klein-worker:latest
#   Container disk: 60+ GB
#   Volume mount:   /workspace (network volume for HF + inductor caches)
#   Exposed ports:  3000/http (signaling), 22/tcp (ssh), 10000-10002/udp (WebRTC)
#   Env:            (none required — Dockerfile provides Phase 9A defaults)

on:
  push:
    branches: ["main"]
    paths:
      - "workers/runpod-flux2klein/Dockerfile"
      - "workers/runpod-flux2klein/entrypoint.sh"
      - "workers/runpod-flux2klein/server.js"
      - "workers/runpod-flux2klein/inference_server.py"
      - "workers/runpod-flux2klein/package.json"
      - "workers/runpod-flux2klein/requirements.txt"
      - "workers/runpod-flux2klein/.dockerignore"
      - ".github/workflows/runpod-flux2klein-docker.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra tag to publish (in addition to :latest and :<sha>)'
        required: false
        type: string
        default: ''

jobs:
  build-and-push:
    # amd64-only: every RunPod GPU pod we use is x86_64. Adding arm64 would
    # double build time + cost for zero deployable surface.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Compute image name
        id: meta
        run: |
          REPO="${{ vars.DOCKERHUB_REPO || secrets.DOCKERHUB_USERNAME }}"
          echo "image=${REPO}/vj0-flux2klein-worker" >> "$GITHUB_OUTPUT"

          # Always publish :latest and :<sha>. Optional :<input-tag> for
          # workflow_dispatch (e.g. "v0.1.0", "blackwell-rc1").
          TAGS="${REPO}/vj0-flux2klein-worker:latest
          ${REPO}/vj0-flux2klein-worker:${{ github.sha }}"
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAGS+=$'\n'"${REPO}/vj0-flux2klein-worker:${{ inputs.tag }}"
          fi
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          context: ./workers/runpod-flux2klein
          file: ./workers/runpod-flux2klein/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          # Blacksmith caches BuildKit layers per repo automatically; no need
          # for explicit cache-from/cache-to like GitHub-hosted runners need.
