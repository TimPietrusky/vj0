name: webrtc-echo-worker - build & push docker image

on:
  push:
    branches: ["master"]
    paths:
      - "workers/webrtc-echo-worker/**"
      - ".github/workflows/webrtc-echo-worker-docker.yml"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image name
        id: meta
        run: |
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/vj0-webrtc-echo-worker" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64)
        uses: useblacksmith/build-push-action@v2
        with:
          context: ./workers/webrtc-echo-worker
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

